version: "2"

linters:
  default: standard
  enable:
    - gocritic
    - gosec
    - unconvert
    - goconst
    - testifylint
  settings:
    govet:
      enable-all: true
      disable:
        # Struct layout micro-optimization noise; readability wins here.
        - fieldalignment
    gocritic:
      enabled-checks:
        - appendAssign
        - dupCase
        - dupBranchBody
        - equalFold
        - sloppyLen
  exclusions:
    rules:
      # Test fixtures repeat literals and spawn shell scripts by design.
      - path: _test\.go
        linters:
          - goconst
          - gosec

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/lugoues/borgmatic-manager
