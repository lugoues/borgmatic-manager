version: 2
project_name: borgmatic-manager

builds:
  - main: ./cmd/borgmatic-manager
    binary: borgmatic-manager
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - config/manager.yaml
      - deploy/systemd/*

nfpms:
  - package_name: borgmatic-manager
    formats:
      - deb
      - rpm
    homepage: https://github.com/lugoues/borgmatic-manager
    description: Label-driven borgmatic backup orchestration for Docker and Podman
    license: MIT
    maintainer: borgmatic-manager contributors
    # No hard dependency on borgmatic: distro packages usually sit below the
    # required 2.1.0 floor. The README install matrix covers uv/pipx.
    recommends:
      - borgbackup
    section: admin
    priority: optional
    contents:
      - src: deploy/systemd/borgmatic-manager.service
        dst: /usr/lib/systemd/system/borgmatic-manager.service
      - src: deploy/systemd/borgmatic-manager.user.service
        dst: /usr/share/borgmatic-manager/borgmatic-manager.user.service
      # The default config is NOT a conffile: the package owns only the
      # /usr/share copy (freely updated on upgrade); postinstall seeds /etc
      # once, and upgrades never touch operator files or prompt.
      - src: config/manager.yaml
        dst: /usr/share/borgmatic-manager/manager.yaml
      - src: LICENSE
        dst: /usr/share/doc/borgmatic-manager/LICENSE
      - src: README.md
        dst: /usr/share/doc/borgmatic-manager/README.md
    scripts:
      postinstall: deploy/packaging/postinstall.sh
      preremove: deploy/packaging/preremove.sh
      postremove: deploy/packaging/postremove.sh

checksum:
  name_template: checksums.txt

# Keyless (OIDC) cosign signatures over every artifact, verifiable with:
#   cosign verify-blob --certificate <artifact>.pem --signature <artifact>.sig \
#     --certificate-identity-regexp 'github.com/lugoues/borgmatic-manager' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com <artifact>
signs:
  - cmd: cosign
    signature: ${artifact}.sig
    certificate: ${artifact}.pem
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
    artifacts: all
    output: true

changelog:
  use: git
  sort: asc
