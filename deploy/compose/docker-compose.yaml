# Docker Compose deployment for borgmatic-manager
# Usage: docker compose up -d
services:
  borgmatic-manager:
    build: ../..
    # Or use pre-built image:
    # image: ghcr.io/lugoues/borgmatic-manager:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/etc/borgmatic-manager:ro
      - borgmatic-cache:/root/.cache/borg
      # Optional: SSH keys for remote borg repositories
      # - ~/.ssh:/root/.ssh:ro
    environment:
      - CONFIG_DIR=/etc/borgmatic-manager
      # Optional: override container socket path
      # - CONTAINER_SOCKET=/var/run/docker.sock
    restart: unless-stopped

volumes:
  borgmatic-cache:
