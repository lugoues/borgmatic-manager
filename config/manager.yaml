# Borgmatic Manager configuration
# See: https://github.com/lugoues/borgmatic-manager
manager:
  # How often to run backup cycles (Go duration format: 30m, 1h, 24h)
  period: "1h"

  # CLI used in generated database dump commands. Default: derived from
  # the container socket the manager is connected to (docker or podman).
  #container_cli: podman

  # Path to the host borgmatic binary. Defaults to searching PATH, then
  # /root/.local/bin (where 'uv tool install' / pipx put it).
  # borgmatic_path: /root/.local/bin/borgmatic

  # Borgmatic actions run for each group per cycle, in order. The default
  # applies retention and consistency checks, not just backup creation.
  # Checks self-throttle (borgmatic runs them monthly by default).
  # actions: [create, prune, compact, check]

  # Bound a single group's borgmatic run (Go duration). 0 = no timeout.
  # run_timeout: "0"

# Default borgmatic settings applied to all groups.
# Anything valid in borgmatic's schema can go here, it is deep-merged with
# per-group overrides from groups/{group-name}.yaml and discovered data.
# Sharing settings with standalone borgmatic configs works via !include:
#   <<: !include /etc/borgmatic/common.yaml
borgmatic:
  repositories:
    - path: /mnt/borg-repository
      label: local

  # Repository encryption passphrase. Required for encrypted repos (recommended).
  # Plain value, or a credential reference resolved by borgmatic at runtime:
  #   encryption_passphrase: "{credential systemd borgmatic.pw}"
  # encryption_passphrase: "change-me"

  # Retention: cycles run every 'period', so keep_hourly decides whether
  # hourly archives survive pruning or collapse to one per day.
  keep_hourly: 24
  keep_daily: 7
  keep_weekly: 4
  keep_monthly: 6

  # Archive naming; {group} is filled in by the manager, the rest by borg.
  # Repo-per-host setups often drop the redundant {hostname}.
  # archive_name_format: "{group}-{now:%Y-%m-%d_%H:%M}"

  checks:
    - name: repository
      frequency: 1 week
    - name: archives
      frequency: 1 month

  # Wait up to this many seconds for another borg process to release the
  # repository lock (e.g. a manually-run borgmatic). Borg's default of 1s
  # fails almost immediately on any contention.
  lock_wait: 120

  # --- Filesystem snapshots (crash-consistent backups) -------------------
  # If your container volumes live on btrfs, zfs, or LVM, enable the matching
  # hook and borgmatic snapshots the containing subvolume/dataset for each
  # backup, then cleans up. For clean granularity, make the volumes directory
  # its own subvolume/dataset (see the README snapshot guide).
  # btrfs:
  # zfs:
  # lvm:

  # --- Monitoring (know when backups fail) -------------------------------
  # Any borgmatic monitoring hook works here; a dead manager means missed
  # pings, which your monitor alerts on.
  # healthchecks:
  #   ping_url: https://hc-ping.com/your-uuid
  # ntfy:
  #   topic: my-backups
  #   states: [fail]
