name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - run: mise run fmt-check
      - run: mise run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - run: mise run test
      - run: mise run race

  e2e-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - name: install borg + borgmatic
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libssl-dev libacl1-dev python3-dev libxxhash-dev liblz4-dev libzstd-dev
          pipx install borgbackup
          pipx install borgmatic
          borg --version
          borgmatic --version
      - name: end-to-end (docker + postgres + mariadb)
        run: E2E_PG_IMAGE=postgres:16-alpine mise run e2e

  e2e-dind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - name: end-to-end (hermetic docker-in-docker host)
        run: mise run e2e-dind

  e2e-podman:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - name: install borg + borgmatic + podman
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libssl-dev libacl1-dev python3-dev libxxhash-dev liblz4-dev libzstd-dev podman
          pipx install borgbackup
          pipx install borgmatic
      - name: start rootful podman socket
        run: sudo systemctl enable --now podman.socket
      - name: end-to-end (podman compat API, incl. event path)
        run: |
          # DOCKER_HOST points compose AND the manager at podman's socket
          # (run.sh derives CONTAINER_SOCKET from it), one daemon for both.
          DOCKER_HOST=unix:///run/podman/podman.sock mise run e2e

  release-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          # Signing needs an OIDC token; only real releases sign.
          args: release --snapshot --clean --skip=sign
      - name: verify the built deb (install/upgrade/remove on current distros)
        run: bash tests/packaging/verify-deb.sh
