name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run fmt-check
      - run: mise run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run test
      - run: mise run race

  e2e-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: install borg + borgmatic
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libssl-dev libacl1-dev python3-dev
          pipx install borgbackup
          pipx install borgmatic
          borg --version
          borgmatic --version
      - name: end-to-end (docker + postgres)
        run: E2E_POSTGRES=1 E2E_PG_IMAGE=postgres:16-alpine mise run e2e

  e2e-dind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: end-to-end (hermetic docker-in-docker host)
        run: mise run e2e-dind

  e2e-podman:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: install borg + borgmatic + podman
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libssl-dev libacl1-dev python3-dev podman
          pipx install borgbackup
          pipx install borgmatic
      - name: start rootful podman socket
        run: sudo systemctl enable --now podman.socket
      - name: end-to-end (podman compat API, incl. event path)
        run: |
          # Rootful podman: CLI calls need sudo; the socket path is podman's.
          E2E_CLI="sudo podman" CONTAINER_SOCKET=/run/podman/podman.sock mise run e2e

  release-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v2
      - uses: goreleaser/goreleaser-action@v6
        with:
          # Signing needs an OIDC token; only real releases sign.
          args: release --snapshot --clean --skip=sign
