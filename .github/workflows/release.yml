name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  # Keyless cosign signing needs an OIDC token.
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v2
      - uses: sigstore/cosign-installer@v3
      - name: gate on lint and race-enabled tests
        run: |
          mise run lint
          mise run race
      - name: verify packages before publishing (snapshot build + deb install/remove cycle)
        run: mise run package-verify
      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: publish APT repository on GitHub Pages
        uses: peternewman/apt-repo-action@ff037894ae6f9a6a40c56f0993d083adc23b7986
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo_supported_arch: |
            amd64
            arm64
          repo_supported_version: stable
          file: dist/*.deb
          file_target_version: stable
          public_key: ${{ secrets.APT_SIGNING_PUBLIC }}
          private_key: ${{ secrets.APT_SIGNING_PRIVATE }}
          key_passphrase: ${{ secrets.APT_SIGNING_PASSPHRASE }}
