name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  # Keyless cosign signing needs an OIDC token.
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v2
      - uses: sigstore/cosign-installer@v3
      - name: verify packages before publishing (snapshot build + deb install/remove cycle)
        run: mise run package-verify
      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
