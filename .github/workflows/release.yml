name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  # Keyless cosign signing needs an OIDC token.
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v3.1.2'
      - name: gate on lint and race-enabled tests
        run: |
          mise run lint
          mise run race
      - name: verify packages before publishing (snapshot build + deb install/remove cycle)
        run: mise run package-verify
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: publish APT repository on GitHub Pages
        uses: peternewman/apt-repo-action@ff037894ae6f9a6a40c56f0993d083adc23b7986
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo_supported_arch: |
            amd64
            arm64
          repo_supported_version: stable
          file: dist/*.deb
          file_target_version: stable
          public_key: ${{ secrets.APT_SIGNING_PUBLIC }}
          private_key: ${{ secrets.APT_SIGNING_PRIVATE }}
          key_passphrase: ${{ secrets.APT_SIGNING_PASSPHRASE }}
